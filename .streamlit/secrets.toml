# .streamlit/secrets.toml
#
# Phase 1.8: Secrets moved to environment variables.
# Do NOT store credentials here.
#
# Set these environment variables in your shell or .env file instead:
#   AUTH_USERNAME=<your-username>
#   AUTH_PASSWORD=<your-password>
#   ANTHROPIC_API_KEY=sk-ant-...
#
# ─────────────────────────────────────────────────────────────
# [auth] bölümü VARSA → şifre kilidi aktif
# [auth] bölümü YOKSA veya dosya yoksa → kilitsiz çalışır
#
# Auth credentials are read from AUTH_USERNAME / AUTH_PASSWORD env vars.
# Uncomment and populate via env vars to enable password protection:
#
# [auth]
# username = "${AUTH_USERNAME}"
# password = "${AUTH_PASSWORD}"
#
# ─────────────────────────────────────────────────────────────
# [anthropic]
# api_key = "${ANTHROPIC_API_KEY}"