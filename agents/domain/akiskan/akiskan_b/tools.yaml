# tools.yaml -- akiskan_b
domain: akiskan
agent: akiskan_b
solver_tier: 1
active_tools: ["openfoam", "fenics"]

planned_tools:
  - name: openfoam
    type: open_source
    tier: 1
    install: "apt-get install openfoam  # or Docker"
    capability: "General-purpose CFD: turbulence, combustion, multiphase"
    status: active
    wrapper: tools/tier1/openfoam_tool.py

  - name: fenics
    type: open_source
    tier: 1
    install: "conda install -c conda-forge fenics-dolfinx"
    capability: "Finite element analysis: structural, thermal, fluid"
    status: active
    wrapper: tools/tier1/fenics_tool.py
