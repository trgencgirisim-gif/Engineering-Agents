# tools.yaml -- biyomedikal_a
domain: biyomedikal
agent: biyomedikal_a
solver_tier: 1
active_tools: ["opensim", "febio"]

planned_tools:
  - name: opensim
    type: open_source
    tier: 1
    install: "conda install -c opensim-org opensim"
    capability: "Musculoskeletal biomechanics simulation"
    status: active
    wrapper: tools/tier1/opensim_tool.py

  - name: febio
    type: open_source
    tier: 1
    install: "pip install febio-python"
    capability: "Biomedical finite element analysis"
    status: active
    wrapper: tools/tier1/febio_tool.py
