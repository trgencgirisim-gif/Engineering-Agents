# tools.yaml -- optik_b
domain: optik
agent: optik_b
solver_tier: 1
active_tools: ["rayoptics", "meep"]

planned_tools:
  - name: rayoptics
    type: open_source
    tier: 1
    install: "pip install rayoptics"
    capability: "Optical system design and ray tracing"
    status: active
    wrapper: tools/tier1/rayoptics_tool.py

  - name: meep
    type: open_source
    tier: 1
    install: "conda install -c conda-forge pymeep"
    capability: "FDTD electromagnetic simulation"
    status: active
    wrapper: tools/tier1/meep_tool.py
