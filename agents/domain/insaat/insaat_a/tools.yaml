# tools.yaml -- insaat_a
domain: insaat
agent: insaat_a
solver_tier: 1
active_tools: ["opensees", "fenics"]

planned_tools:
  - name: opensees
    type: open_source
    tier: 1
    install: "pip install openseespy"
    capability: "Structural and earthquake engineering FEM"
    status: active
    wrapper: tools/tier1/opensees_tool.py

  - name: fenics
    type: open_source
    tier: 1
    install: "conda install -c conda-forge fenics-dolfinx"
    capability: "Finite element analysis: structural, thermal, fluid"
    status: active
    wrapper: tools/tier1/fenics_tool.py
